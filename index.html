<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>建設業向け業務改善アプリ</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: #f3f5f8;
        color: #1f2937;
      }
      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.6rem;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        margin-bottom: 16px;
      }
      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
      input,
      select,
      button {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        box-sizing: border-box;
        font-size: 0.95rem;
      }
      button {
        background: #0f766e;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background: #0d5f59;
      }
      .kpi {
        font-size: 0.9rem;
        color: #4b5563;
      }
      .kpi strong {
        display: block;
        margin-top: 4px;
        font-size: 1.4rem;
        color: #111827;
      }
      .task-list {
        display: grid;
        gap: 10px;
      }
      .task-item {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px;
        display: grid;
        gap: 6px;
      }
      .meta {
        color: #6b7280;
        font-size: 0.86rem;
      }
      .row {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto;
        align-items: center;
      }
      .empty {
        color: #6b7280;
        text-align: center;
        padding: 12px 0;
      }
      .danger {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>建設業向け 業務改善アプリ</h1>

      <section class="card">
        <div class="grid">
          <label>現場名<input id="site" placeholder="例: A棟新築工事" /></label>
          <label>作業内容<input id="task" placeholder="例: 鉄筋組立" /></label>
          <label>担当者<input id="owner" placeholder="例: 田中" /></label>
          <label>期限<input id="due" type="date" /></label>
          <label
            >状態
            <select id="status">
              <option value="未着手">未着手</option>
              <option value="進行中">進行中</option>
              <option value="完了">完了</option>
            </select>
          </label>
        </div>
        <div style="margin-top: 12px">
          <button id="addTask">タスクを追加</button>
        </div>
      </section>

      <section class="card">
        <div class="grid">
          <div class="kpi">総タスク数<strong id="totalCount">0</strong></div>
          <div class="kpi">期限超過<strong id="lateCount">0</strong></div>
          <div class="kpi">完了率<strong id="doneRate">0%</strong></div>
          <label
            >表示フィルタ
            <select id="filterStatus">
              <option value="all">すべて</option>
              <option value="未着手">未着手</option>
              <option value="進行中">進行中</option>
              <option value="完了">完了</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card">
        <div id="taskList" class="task-list"></div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "construction_tasks_v1";
      const elements = {
        site: document.getElementById("site"),
        task: document.getElementById("task"),
        owner: document.getElementById("owner"),
        due: document.getElementById("due"),
        status: document.getElementById("status"),
        addTask: document.getElementById("addTask"),
        filterStatus: document.getElementById("filterStatus"),
        totalCount: document.getElementById("totalCount"),
        lateCount: document.getElementById("lateCount"),
        doneRate: document.getElementById("doneRate"),
        taskList: document.getElementById("taskList"),
      };

      const readTasks = () => {
        try {
          const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      };

      const writeTasks = (tasks) => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      };

      const isLate = (task) =>
        task.status !== "完了" && task.due && new Date(task.due) < new Date(new Date().toDateString());

      const render = () => {
        const tasks = readTasks();
        const filter = elements.filterStatus.value;
        const visible = filter === "all" ? tasks : tasks.filter((task) => task.status === filter);

        elements.totalCount.textContent = String(tasks.length);
        elements.lateCount.textContent = String(tasks.filter(isLate).length);
        const done = tasks.filter((task) => task.status === "完了").length;
        elements.doneRate.textContent = tasks.length ? `${Math.round((done / tasks.length) * 100)}%` : "0%";

        elements.taskList.textContent = "";
        if (!visible.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "表示するタスクがありません";
          elements.taskList.appendChild(empty);
          return;
        }

        visible.forEach((task) => {
          const item = document.createElement("article");
          item.className = "task-item";

          const row = document.createElement("div");
          row.className = "row";

          const title = document.createElement("strong");
          title.textContent = `${task.site} / ${task.task}`;

          const status = document.createElement("span");
          status.className = isLate(task) ? "danger" : "";
          status.textContent = task.status;

          row.appendChild(title);
          row.appendChild(status);

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `担当: ${task.owner || "未設定"} / 期限: ${task.due || "未設定"}`;

          item.appendChild(row);
          item.appendChild(meta);
          elements.taskList.appendChild(item);
        });
      };

      elements.addTask.addEventListener("click", () => {
        const site = elements.site.value.trim();
        const task = elements.task.value.trim();
        if (!site || !task) {
          alert("現場名と作業内容は必須です。");
          return;
        }

        const tasks = readTasks();
        tasks.unshift({
          site,
          task,
          owner: elements.owner.value.trim(),
          due: elements.due.value,
          status: elements.status.value,
        });
        writeTasks(tasks);

        elements.site.value = "";
        elements.task.value = "";
        elements.owner.value = "";
        elements.due.value = "";
        elements.status.value = "未着手";
        render();
      });

      elements.filterStatus.addEventListener("change", render);
      render();
    </script>
  </body>
</html>
